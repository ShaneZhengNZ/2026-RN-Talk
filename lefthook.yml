# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: eslint
      root: "apps/rn-talk/"
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx eslint --no-error-on-unmatched-pattern {staged_files}

    - name: typecheck
      run: bun run typecheck
